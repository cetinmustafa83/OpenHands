
services:
  openhands:
    build:
      context: ./
      dockerfile: ./containers/app/Dockerfile
    image: openhands:latest
    container_name: openhands-app-${DATE:-}
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=${AGENT_SERVER_IMAGE_REPOSITORY:-ghcr.io/openhands/agent-server}
      - AGENT_SERVER_IMAGE_TAG=${AGENT_SERVER_IMAGE_TAG:-1.12.0-python}
      #- SANDBOX_USER_ID=${SANDBOX_USER_ID:-1234} # enable this only if you want a specific non-root sandbox user but you will have to manually adjust permissions of ~/.openhands for this user
      - WORKSPACE_MOUNT_PATH=${WORKSPACE_MOUNT_PATH:-$PWD/workspace}
      - OH_SECRET_KEY=${OH_SECRET_KEY:-}
      - LOG_ALL_EVENTS=${LOG_ALL_EVENTS:-false}
      - PORT=${PORT:-3000}
      # Agent server sandbox ports: exposed range so reverse proxies (traefik) can route WebSocket connections
      - SANDBOX_PORT_RANGE_START=${SANDBOX_PORT_RANGE_START:-30100}
      - SANDBOX_PORT_RANGE_END=${SANDBOX_PORT_RANGE_END:-30200}
      # URL pattern for agent server containers — set to your external hostname so the browser can reach them
      # Example: OH_SANDBOX_CONTAINER_URL_PATTERN=http://myhost.example.com:{port}
      - OH_SANDBOX_CONTAINER_URL_PATTERN=${OH_SANDBOX_CONTAINER_URL_PATTERN:-http://host.docker.internal:{port}}
      - OH_SANDBOX_HOST_PORT=${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
      # Expose agent server sandbox port range for WebSocket connections
      - "${SANDBOX_PORT_RANGE_START:-30100}-${SANDBOX_PORT_RANGE_END:-30200}:${SANDBOX_PORT_RANGE_START:-30100}-${SANDBOX_PORT_RANGE_END:-30200}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
      - ${WORKSPACE_BASE:-$PWD/workspace}:/opt/workspace_base
    pull_policy: build
    stdin_open: true
    tty: true
