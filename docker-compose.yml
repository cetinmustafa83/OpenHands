
services:
  openhands:
    build:
      context: ./
      dockerfile: ./containers/app/Dockerfile
    image: openhands:latest
    container_name: openhands-app-${DATE:-}
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=${AGENT_SERVER_IMAGE_REPOSITORY:-ghcr.io/openhands/agent-server}
      - AGENT_SERVER_IMAGE_TAG=${AGENT_SERVER_IMAGE_TAG:-1.12.0-python}
      #- SANDBOX_USER_ID=${SANDBOX_USER_ID:-1234} # enable this only if you want a specific non-root sandbox user but you will have to manually adjust permissions of ~/.openhands for this user
      - WORKSPACE_MOUNT_PATH=${WORKSPACE_MOUNT_PATH:-$PWD/workspace}
      - OH_SECRET_KEY=${OH_SECRET_KEY:-}
      - LOG_ALL_EVENTS=${LOG_ALL_EVENTS:-false}
      # Agent server sandbox ports: exposed range so browser can reach WebSocket connections
      - SANDBOX_PORT_RANGE_START=${SANDBOX_PORT_RANGE_START:-30100}
      - SANDBOX_PORT_RANGE_END=${SANDBOX_PORT_RANGE_END:-30200}
      # Traefik integration: routes WebSocket through Traefik (80/443) instead of direct host ports.
      # Required for NAT/home-server deployments where only 80/443 are forwarded.
      - OH_TRAEFIK_NETWORK=${OH_TRAEFIK_NETWORK:-dokploy-network}
      # Replace with your actual external hostname. {port} is filled automatically per agent container.
      - OH_SANDBOX_CONTAINER_URL_PATTERN=${OH_SANDBOX_CONTAINER_URL_PATTERN:-http://ai-openhands-6bdd7d-92-206-22-80.traefik.me/runtime/{port}}
      - OH_SANDBOX_HOST_PORT=3000
      # Persist settings/secrets/conversations to the mounted volume
      # FILE_STORE_PATH: V0 settings/secrets store path
      - FILE_STORE_PATH=/.openhands
      # OH_PERSISTENCE_DIR: V1 app server persistence (SQLite DB, JWT keys, conversations)
      - OH_PERSISTENCE_DIR=/.openhands
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-data:/.openhands
      - ${WORKSPACE_BASE:-$PWD/workspace}:/opt/workspace_base
    pull_policy: build
    stdin_open: true
    tty: true

volumes:
  openhands-data:
    driver: local
